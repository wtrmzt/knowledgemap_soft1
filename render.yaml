# Render Blueprint
# https://render.com/docs/blueprint-spec

databases:
  - name: knowledge-map-db
    plan: free
    databaseName: knowledge_map
    user: kmuser

services:
  - type: web
    name: knowledge-map-app
    runtime: python
    plan: free
    buildCommand: bash build.sh
    startCommand: cd backend && gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false   # デプロイ後に手動設定
      - key: DATABASE_URL
        fromDatabase:
          name: knowledge-map-db
          property: connectionString
      - key: CORS_ORIGINS
        value: "*"
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: NODE_VERSION
        value: "20"
